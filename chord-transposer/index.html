<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>吉他和弦轉調器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #05070b;
      --panel: #101722;
      --line: rgba(226, 232, 240, 0.14);
      --text: #eef2f7;
      --muted: #95a3b8;
      --gold: #d6a84f;
      --teal: #2dd4bf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(214, 168, 79, 0.12), transparent 34%),
        linear-gradient(225deg, rgba(45, 212, 191, 0.08), transparent 28%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.024) 0 1px, transparent 1px 74px),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
    }

    .app-shell {
      max-width: 900px;
    }

    .back-link {
      color: var(--muted);
      font-weight: 800;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--gold);
    }

    .tool-panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 28px 76px rgba(0, 0, 0, 0.42);
    }

    h1 {
      color: var(--text);
      letter-spacing: 0;
    }

    .subtle-text,
    .form-label {
      color: var(--muted);
    }

    .form-select { background: rgba(5, 7, 11, 0.78); border: 1px solid rgba(226, 232, 240, 0.16); border-radius: 8px; color: var(--text); padding: 10px 12px; } .form-select:focus { border-color: rgba(214, 168, 79, 0.72); box-shadow: 0 0 0 0.22rem rgba(214, 168, 79, 0.14); } .analysis-text { color: var(--muted); font-weight: 700; } .form-control {
      min-height: 190px;
      resize: vertical;
      background: rgba(5, 7, 11, 0.78);
      border: 1px solid rgba(226, 232, 240, 0.16);
      border-radius: 8px;
      color: var(--text);
      font-family: Consolas, "Courier New", monospace;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
    }

    .form-control:focus {
      background: rgba(7, 10, 16, 0.92);
      border-color: rgba(214, 168, 79, 0.72);
      color: var(--text);
      box-shadow: 0 0 0 0.22rem rgba(214, 168, 79, 0.14);
    }

    .form-control::placeholder {
      color: #65748a;
    }

    .result-box {
      min-height: 98px;
      background: #080b11;
      color: #f7e3b2;
      border: 1px solid rgba(214, 168, 79, 0.24);
      border-radius: 8px;
      padding: 18px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 1.12rem;
      box-shadow: inset 0 0 28px rgba(214, 168, 79, 0.05);
    }

    .step-badge {
      min-width: 5rem;
      background: rgba(214, 168, 79, 0.14) !important;
      border: 1px solid rgba(214, 168, 79, 0.42) !important;
      color: #f5d48a !important;
      border-radius: 999px;
    }

    .btn {
      border-radius: 8px;
      font-weight: 900;
      padding: 10px 16px;
    }

    .btn-primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #05070b;
    }

    .btn-primary:hover {
      background: #efc66a;
      border-color: #efc66a;
      color: #05070b;
    }

    .btn-outline-primary,
    .btn-outline-secondary {
      border-color: rgba(226, 232, 240, 0.22);
      color: var(--text);
    }

    .btn-outline-primary:hover,
    .btn-outline-secondary:hover {
      background: rgba(45, 212, 191, 0.14);
      border-color: rgba(45, 212, 191, 0.55);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="container py-5 app-shell">
    <div class="mb-4">
      <a class="back-link" href="../index.html">← 返回 MyApps</a>
    </div>

    <section class="tool-panel p-4 p-md-5">
      <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3 mb-4">
        <div>
          <p class="mb-2 fw-bold text-uppercase" style="color: var(--gold); letter-spacing: .12em; font-size: .78rem;">Chord Transposer</p>
          <h1 class="h2 fw-bold mb-2">吉他和弦轉調器</h1>
          <p class="subtle-text mb-0">輸入和弦後，按升 Key 或降 Key 轉換半音。</p>
        </div>
        <span id="stepDisplay" class="badge step-badge py-2">0 半音</span>
      </div>

      <div class="row g-3 mb-3"><div class="col-md-6"><label for="accidentalMode" class="form-label fw-semibold">記譜偏好</label><select id="accidentalMode" class="form-select"><option value="sharp">升記號 #</option><option value="flat">降記號 b</option></select></div><div class="col-md-6"><label class="form-label fw-semibold">快速範例</label><button id="btnExample" type="button" class="btn btn-outline-secondary w-100">載入常見和弦</button></div></div><div class="mb-3"><label for="chordInput" class="form-label fw-semibold">原始和弦</label>
        <textarea id="chordInput" class="form-control" placeholder="例如：C G Am F&#10;或：Bb F Gm Eb"></textarea>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-4">
        <button id="btnDown" type="button" class="btn btn-outline-primary">降 Key</button>
        <button id="btnUp" type="button" class="btn btn-primary">升 Key</button>
        <button id="btnReset" type="button" class="btn btn-outline-secondary ms-md-auto">重設</button>
      </div>

      <div>
        <div class="d-flex align-items-center justify-content-between gap-3 mb-2">
          <label class="form-label fw-semibold mb-0">轉調結果</label>
          <button id="btnCopy" type="button" class="btn btn-sm btn-outline-secondary">複製</button>
        </div>
        <div id="resultDisplay" class="result-box">請先輸入和弦</div><p id="analysisText" class="analysis-text mt-3 mb-0">可處理 Am7、Bb、F#/A# 等常見和弦。</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
